<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect fill="#ffffff" width="800" height="400"/>
  <text x="400" y="40" text-anchor="middle" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#1A1A1A">AI Career Path Roadmap</text>

  <!-- ML Engineer -->
  <rect x="60" y="80" width="130" height="80" rx="8" fill="#1976D2" stroke="#0D47A1" stroke-width="2"/>
  <text x="125" y="115" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">ML</text>
  <text x="125" y="135" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">Engineer</text>
  <text x="125" y="180" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#666666">Python, TensorFlow</text>
  <text x="125" y="195" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#666666">SQL, Docker</text>
  <text x="125" y="230" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#1976D2">$120K-$180K</text>
  <text x="125" y="250" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#333333">Entry</text>

  <!-- Data Scientist -->
  <rect x="260" y="80" width="130" height="80" rx="8" fill="#7B1FA2" stroke="#4A148C" stroke-width="2"/>
  <text x="325" y="115" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">Data</text>
  <text x="325" y="135" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">Scientist</text>
  <text x="325" y="180" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#666666">Python, R, SQL</text>
  <text x="325" y="195" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#666666">Statistics, ML</text>
  <text x="325" y="230" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#7B1FA2">$100K-$160K</text>
  <text x="325" y="250" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#333333">Senior</text>

  <!-- AI Researcher -->
  <rect x="460" y="80" width="130" height="80" rx="8" fill="#C62828" stroke="#B71C1C" stroke-width="2"/>
  <text x="525" y="115" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">AI</text>
  <text x="525" y="135" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">Researcher</text>
  <text x="525" y="180" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#666666">Python, PyTorch</text>
  <text x="525" y="195" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#666666">Math, Research</text>
  <text x="525" y="230" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#C62828">$150K-$300K</text>
  <text x="525" y="250" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#333333">Principal</text>

  <!-- MLOps Engineer -->
  <rect x="660" y="80" width="130" height="80" rx="8" fill="#00838F" stroke="#006064" stroke-width="2"/>
  <text x="725" y="115" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">MLOps</text>
  <text x="725" y="135" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">Engineer</text>
  <text x="725" y="180" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#666666">Python, Kubernetes</text>
  <text x="725" y="195" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#666666">CI/CD, Cloud</text>
  <text x="725" y="230" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#00838F">$130K-$200K</text>
  <text x="725" y="250" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#333333">Staff</text>

  <!-- Footer -->
  <text x="400" y="340" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#666666">Skills: Python, TensorFlow/PyTorch, SQL, Docker, AWS/GCP</text>
</svg>