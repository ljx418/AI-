<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23"/>
      <stop offset="100%" style="stop-color:#1a1a3e"/>
    </linearGradient>
    <linearGradient id="supervisedGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe"/>
      <stop offset="100%" style="stop-color:#00f2fe"/>
    </linearGradient>
    <linearGradient id="unsupervisedGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <linearGradient id="reinforcementGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#ef4444"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="url(#bgGrad2)"/>

  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#ffffff">机器学习三大范式</text>

  <!-- Center Hub -->
  <circle cx="600" cy="420" r="80" fill="#2a2a4e" stroke="#6c63ff" stroke-width="3" filter="url(#shadow)"/>
  <text x="600" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#ffffff">机器学习</text>
  <text x="600" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#8a8aaa">Machine Learning</text>

  <!-- Connecting Lines -->
  <path d="M 600 340 Q 400 280 250 200" stroke="#4facfe" stroke-width="4" fill="none"/>
  <path d="M 600 340 Q 600 280 600 180" stroke="#a855f7" stroke-width="4" fill="none"/>
  <path d="M 600 340 Q 800 280 950 200" stroke="#f59e0b" stroke-width="4" fill="none"/>

  <!-- Supervised Learning Branch -->
  <g transform="translate(120, 120)">
    <rect x="0" y="0" width="280" height="300" rx="20" fill="#0d2847" stroke="url(#supervisedGrad)" stroke-width="3" filter="url(#shadow)"/>
    <text x="140" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#00f2fe">监督学习</text>
    <text x="140" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#6ca8c8">Supervised Learning</text>

    <!-- Classification Icon -->
    <g transform="translate(30, 90)">
      <rect width="80" height="80" rx="10" fill="#1a4a7a"/>
      <circle cx="40" cy="35" r="20" fill="#4facfe"/>
      <rect x="15" y="55" width="50" height="10" rx="3" fill="#4facfe"/>
      <text x="40" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#6ca8c8">分类</text>
    </g>

    <!-- Regression Icon -->
    <g transform="translate(170, 90)">
      <rect width="80" height="80" rx="10" fill="#1a4a7a"/>
      <line x1="15" y1="60" x2="65" y2="25" stroke="#4facfe" stroke-width="3"/>
      <circle cx="65" cy="25" r="8" fill="#4facfe"/>
      <text x="40" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#6ca8c8">回归</text>
    </g>

    <!-- Examples -->
    <text x="140" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">典型算法</text>
    <text x="140" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#6ca8c8">• 决策树、随机森林</text>
    <text x="140" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#6ca8c8">• SVM、朴素贝叶斯</text>
    <text x="140" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#6ca8c8">• 神经网络、CNN/RNN</text>

    <text x="140" y="288" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#4facfe">✓ 需要标注数据</text>
  </g>

  <!-- Unsupervised Learning Branch -->
  <g transform="translate(460, 100)">
    <rect x="0" y="0" width="280" height="300" rx="20" fill="#2a0d47" stroke="url(#unsupervisedGrad)" stroke-width="3" filter="url(#shadow)"/>
    <text x="140" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#ec4899">无监督学习</text>
    <text x="140" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#c86ab8">Unsupervised Learning</text>

    <!-- Clustering Icon -->
    <g transform="translate(30, 90)">
      <rect width="80" height="80" rx="10" fill="#4a1a7a"/>
      <circle cx="25" cy="35" r="12" fill="#a855f7"/>
      <circle cx="55" cy="35" r="12" fill="#ec4899"/>
      <circle cx="40" cy="55" r="12" fill="#f472b6"/>
      <text x="40" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#c86ab8">聚类</text>
    </g>

    <!-- Dimensionality Reduction Icon -->
    <g transform="translate(170, 90)">
      <rect width="80" height="80" rx="10" fill="#4a1a7a"/>
      <text x="40" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#a855f7">3D</text>
      <text x="40" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#ec4899">→</text>
      <text x="40" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#c86ab8">降维</text>
    </g>

    <!-- Examples -->
    <text x="140" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">典型算法</text>
    <text x="140" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#c86ab8">• K-Means、DBSCAN</text>
    <text x="140" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#c86ab8">• PCA、t-SNE</text>
    <text x="140" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#c86ab8">• 自编码器、GAN</text>

    <text x="140" y="288" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#ec4899">✓ 无需标注数据</text>
  </g>

  <!-- Reinforcement Learning Branch -->
  <g transform="translate(800, 120)">
    <rect x="0" y="0" width="280" height="300" rx="20" fill="#472a0d" stroke="url(#reinforcementGrad)" stroke-width="3" filter="url(#shadow)"/>
    <text x="140" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#f59e0b">强化学习</text>
    <text x="140" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#c8a06a">Reinforcement Learning</text>

    <!-- Agent Icon -->
    <g transform="translate(30, 90)">
      <rect width="80" height="80" rx="10" fill="#7a4a1a"/>
      <rect x="20" y="20" width="40" height="40" rx="5" fill="#f59e0b"/>
      <text x="40" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">Agent</text>
      <text x="40" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#c8a06a">智能体</text>
    </g>

    <!-- Environment Icon -->
    <g transform="translate(170, 90)">
      <rect width="80" height="80" rx="10" fill="#7a4a1a"/>
      <rect x="20" y="15" width="40" height="40" rx="3" fill="#ef4444" stroke="#f59e0b" stroke-width="2"/>
      <text x="40" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#f59e0b">Environment</text>
      <text x="40" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#c8a06a">环境</text>
    </g>

    <!-- Examples -->
    <text x="140" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">典型算法</text>
    <text x="140" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#c8a06a">• Q-Learning、DQN</text>
    <text x="140" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#c8a06a">• Policy Gradient</text>
    <text x="140" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#c8a06a">• PPO、A3C</text>

    <text x="140" y="288" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#f59e0b">✓ 通过奖励学习</text>
  </g>

  <!-- Bottom Labels -->
  <g transform="translate(200, 650)">
    <circle cx="15" cy="10" r="8" fill="#4facfe"/>
    <text x="30" y="15" font-family="Arial, sans-serif" font-size="14" fill="#ffffff">监督学习: 输入→正确输出 (分类/回归)</text>
  </g>
  <g transform="translate(200, 680)">
    <circle cx="15" cy="10" r="8" fill="#a855f7"/>
    <text x="30" y="15" font-family="Arial, sans-serif" font-size="14" fill="#ffffff">无监督学习: 输入→结构发现 (聚类/降维)</text>
  </g>
  <g transform="translate(200, 710)">
    <circle cx="15" cy="10" r="8" fill="#f59e0b"/>
    <text x="30" y="15" font-family="Arial, sans-serif" font-size="14" fill="#ffffff">强化学习: 智能体→环境交互→奖励最大化</text>
  </g>

  <!-- Arrow labels on connecting lines -->
  <text x="350" y="260" font-family="Arial, sans-serif" font-size="11" fill="#4facfe">分类/回归</text>
  <text x="600" y="250" font-family="Arial, sans-serif" font-size="11" fill="#a855f7">聚类/降维</text>
  <text x="850" y="260" font-family="Arial, sans-serif" font-size="11" fill="#f59e0b">决策/奖励</text>
</svg>