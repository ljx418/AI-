<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="bar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4ecdc4"/>
      <stop offset="100%" style="stop-color:#45b7d1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="url(#bg)" rx="10"/>

  <!-- Title -->
  <text x="200" y="30" text-anchor="middle" fill="#fff" font-size="18" font-weight="bold">LLM Benchmark 评测体系</text>

  <!-- Benchmark Categories -->
  <g transform="translate(30, 60)">
    <!-- MMLU -->
    <rect x="0" y="0" width="80" height="25" fill="#2d3436" rx="4"/>
    <text x="40" y="17" text-anchor="middle" fill="#fff" font-size="10">MMLU</text>
    <rect x="0" y="30" width="70" height="8" fill="url(#bar)" rx="2"/>
    <text x="85" y="37" fill="#4ecdc4" font-size="9">86%</text>

    <!-- HumanEval -->
    <rect x="110" y="0" width="80" height="25" fill="#2d3436" rx="4"/>
    <text x="150" y="17" text-anchor="middle" fill="#fff" font-size="10">HumanEval</text>
    <rect x="110" y="30" width="50" height="8" fill="url(#bar)" rx="2"/>
    <text x="165" y="37" fill="#4ecdc4" font-size="9">67%</text>

    <!-- GSM8K -->
    <rect x="220" y="0" width="80" height="25" fill="#2d3436" rx="4"/>
    <text x="260" y="17" text-anchor="middle" fill="#fff" font-size="10">GSM8K</text>
    <rect x="220" y="30" width="75" height="8" fill="url(#bar)" rx="2"/>
    <text x="300" y="37" fill="#4ecdc4" font-size="9">92%</text>

    <!-- Needle -->
    <rect x="330" y="0" width="60" height="25" fill="#2d3436" rx="4"/>
    <text x="360" y="17" text-anchor="middle" fill="#fff" font-size="10">Needle</text>
    <rect x="330" y="30" width="55" height="8" fill="url(#bar)" rx="2"/>
    <text x="390" y="37" fill="#4ecdc4" font-size="9">99%</text>
  </g>

  <!-- Chart Area -->
  <g transform="translate(30, 100)">
    <text x="0" y="0" fill="#a0a0a0" font-size="11">评测方法论</text>
    <g transform="translate(0, 20)">
      <circle cx="5" cy="5" r="4" fill="#4ecdc4"/>
      <text x="20" y="9" fill="#fff" font-size="10">闭集评测 (Closed-ended)</text>
    </g>
    <g transform="translate(0, 45)">
      <circle cx="5" cy="5" r="4" fill="#f39c12"/>
      <text x="20" y="9" fill="#fff" font-size="10">开集评测 (Open-ended)</text>
    </g>
    <g transform="translate(0, 70)">
      <circle cx="5" cy="5" r="4" fill="#e74c3c"/>
      <text x="20" y="9" fill="#fff" font-size="10">人类偏好 (Human Preference)</text>
    </g>
  </g>

  <!-- Leaderboard -->
  <g transform="translate(200, 100)">
    <text x="0" y="0" fill="#a0a0a0" font-size="11">排行榜</text>
    <g transform="translate(0, 20)">
      <rect x="0" y="0" width="160" height="25" fill="#2d3436" rx="4"/>
      <text x="10" y="17" fill="#fff" font-size="10">GPT-4</text>
      <text x="140" y="17" fill="#4ecdc4" font-size="10" text-anchor="end">ELO: 1280</text>
    </g>
    <g transform="translate(0, 30)">
      <rect x="0" y="0" width="160" height="25" fill="#2d3436" rx="4"/>
      <text x="10" y="17" fill="#fff" font-size="10">Claude 3</text>
      <text x="140" y="17" fill="#4ecdc4" font-size="10" text-anchor="end">ELO: 1272</text>
    </g>
    <g transform="translate(0, 60)">
      <rect x="0" y="0" width="160" height="25" fill="#2d3436" rx="4"/>
      <text x="10" y="17" fill="#fff" font-size="10">Gemini 1.5</text>
      <text x="140" y="17" fill="#4ecdc4" font-size="10" text-anchor="end">ELO: 1258</text>
    </g>
  </g>

  <!-- Key Metrics -->
  <g transform="translate(30, 230)">
    <text x="0" y="0" fill="#a0a0a0" font-size="11">关键指标</text>
    <text x="0" y="20" fill="#888" font-size="9">• Pass@K: 代码生成通过率</text>
    <text x="0" y="35" fill="#888" font-size="9">• CoT: 链式思考推理</text>
    <text x="0" y="50" fill="#888" font-size="9">• Few-shot: 少样本提示</text>
  </g>

  <g transform="translate(150, 230)">
    <text x="0" y="0" fill="#a0a0a0" font-size="11">arXiv 论文</text>
    <text x="0" y="20" fill="#4ecdc4" font-size="9">2009.01352 (MMLU)</text>
    <text x="0" y="35" fill="#4ecdc4" font-size="9">2107.03374 (HumanEval)</text>
    <text x="0" y="50" fill="#4ecdc4" font-size="9">2201.11903 (CoT)</text>
  </g>
</svg>