<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>

  <rect width="400" height="300" fill="url(#bg)" rx="10"/>

  <text x="200" y="25" text-anchor="middle" fill="#fff" font-size="16" font-weight="bold">AI 面试高频题</text>

  <g transform="translate(20, 50)">
    <rect x="0" y="0" width="170" height="50" fill="#2d3436" rx="6"/>
    <text x="85" y="20" text-anchor="middle" fill="#4ecdc4" font-size="11" font-weight="bold">机器学习</text>
    <text x="85" y="38" text-anchor="middle" fill="#888" font-size="10">50 题</text>

    <rect x="185" y="0" width="170" height="50" fill="#2d3436" rx="6"/>
    <text x="270" y="20" text-anchor="middle" fill="#f39c12" font-size="11" font-weight="bold">深度学习</text>
    <text x="270" y="38" text-anchor="middle" fill="#888" font-size="10">50 题</text>
  </g>

  <g transform="translate(20, 110)">
    <rect x="0" y="0" width="170" height="50" fill="#2d3436" rx="6"/>
    <text x="85" y="20" text-anchor="middle" fill="#e74c3c" font-size="11" font-weight="bold">NLP</text>
    <text x="85" y="38" text-anchor="middle" fill="#888" font-size="10">30 题</text>

    <rect x="185" y="0" width="170" height="50" fill="#2d3436" rx="6"/>
    <text x="270" y="20" text-anchor="middle" fill="#9b59b6" font-size="11" font-weight="bold">LLM</text>
    <text x="270" y="38" text-anchor="middle" fill="#888" font-size="10">50 题</text>
  </g>

  <g transform="translate(20, 170)">
    <rect x="0" y="0" width="170" height="50" fill="#2d3436" rx="6"/>
    <text x="85" y="20" text-anchor="middle" fill="#3498db" font-size="11" font-weight="bold">RAG/Agent</text>
    <text x="85" y="38" text-anchor="middle" fill="#888" font-size="10">50 题</text>

    <rect x="185" y="0" width="170" height="50" fill="#2d3436" rx="6"/>
    <text x="270" y="20" text-anchor="middle" fill="#2ecc71" font-size="11" font-weight="bold">行为面</text>
    <text x="270" y="38" text-anchor="middle" fill="#888" font-size="10">30 题</text>
  </g>

  <g transform="translate(30, 240)">
    <text x="0" y="0" fill="#a0a0a0" font-size="11">总计: 260+ 题</text>
    <text x="0" y="18" fill="#666" font-size="9">来源: 2023-2025 面试真题回忆</text>
  </g>
